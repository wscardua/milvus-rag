# Infra local da POC de RAG — Postgres + Milvus (standalone: etcd + minio + milvus)
# Runtime alvo: Podman (`podman compose up -d`). Compatível com docker compose v2.
#
# Persistência: bind mounts DENTRO do projeto, em ${DATA_DIR:-../data/volumes}.
# Os dados NÃO são efêmeros e ficam versionáveis/inspecionáveis no host (gitignored).
# Removê-los = apagar a pasta data/volumes/ (ou `down -v`).
name: milvus-rag

services:
  postgres:
    image: postgres:${POSTGRES_VERSION:-16}
    container_name: milvus-rag-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-rag}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rag}
      POSTGRES_DB: ${POSTGRES_DB:-rag}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - ${DATA_DIR:-../data/volumes}/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rag} -d ${POSTGRES_DB:-rag}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  etcd:
    image: quay.io/coreos/etcd:${ETCD_VERSION:-v3.5.16}
    container_name: milvus-rag-etcd
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    command: etcd -advertise-client-urls=http://etcd:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    volumes:
      - ${DATA_DIR:-../data/volumes}/etcd:/etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 3
    restart: unless-stopped

  minio:
    image: minio/minio:${MINIO_VERSION:-RELEASE.2024-12-18T13-15-44Z}
    container_name: milvus-rag-minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    command: minio server /minio_data --console-address ":9001"
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - ${DATA_DIR:-../data/volumes}/minio:/minio_data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    restart: unless-stopped

  milvus:
    image: milvusdb/milvus:${MILVUS_VERSION:-v2.5.4}
    container_name: milvus-rag-standalone
    command: ["milvus", "run", "standalone"]
    security_opt:
      - seccomp:unconfined
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    ports:
      - "${MILVUS_PORT:-19530}:19530"   # gRPC (clientes pymilvus)
      - "${MILVUS_METRICS_PORT:-9091}:9091"   # métricas / healthz
    volumes:
      - ${DATA_DIR:-../data/volumes}/milvus:/var/lib/milvus
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      start_period: 90s
      timeout: 20s
      retries: 5
    depends_on:
      etcd:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped

  attu:
    image: zilliz/attu:${ATTU_VERSION:-v2.5}
    container_name: milvus-rag-attu
    environment:
      MILVUS_URL: milvus:19530
    ports:
      - "${ATTU_PORT:-3000}:3000"
    depends_on:
      milvus:
        condition: service_healthy
    restart: unless-stopped
